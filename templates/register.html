{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center;">Student Registration</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Create your account</p>
        
        <form method="POST" action="{{ url_for('main.register') }}">
            <div style="margin-bottom: 1rem;">
                <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <div style="margin-bottom: 1rem;">
                <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username / Matric No</label>
                <input type="text" id="username" name="username" required placeholder="Enter your ID">
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label for="department" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Department (Optional)</label>
                <input type="text" id="department" name="department" placeholder="Enter your department">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            <p style="text-align: center; margin-top: 1rem;">Already have an account? <a href="{{ url_for('main.login') }}">Log in here</a></p>
        </form>
    </div>
</div>
{% endblock %}
