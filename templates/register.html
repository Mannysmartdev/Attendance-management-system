{% extends "base.html" %}
{% block title %}AttendSys — Register{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="logo-area">
        <i class="bi bi-person-plus-fill"></i>
        <h2>Student Registration</h2>
        <p>Create your account</p>
    </div>

    <form method="POST" action="{{ url_for('main.register') }}" autocomplete="off">
        <div style="margin-bottom: 1rem;">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Enter your full name">
        </div>

        <div style="margin-bottom: 1rem;">
            <label for="username">Username / Matric No</label>
            <input type="text" id="username" name="username" required placeholder="Enter your ID">
        </div>

        <div style="margin-bottom: 1rem;">
            <label for="department">Department (Optional)</label>
            <input type="text" id="department" name="department" placeholder="Enter your department">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="bi bi-person-check"></i> Register
        </button>

        <p style="text-align: center; margin-top: 1.25rem; font-size: .88rem; color: var(--text-secondary);">
            Already have an account?
            <a href="{{ url_for('main.login') }}">Sign in here</a>
        </p>
    </form>
</div>
{% endblock %}
