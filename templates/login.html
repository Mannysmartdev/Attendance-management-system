{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center;">Welcome Back</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Sign in to your account</p>
        
        <form method="POST" action="">
            <div style="margin-bottom: 1rem;">
                <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username / Matric No</label>
                <input type="text" id="username" name="username" required placeholder="Enter your ID">
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
            <p style="text-align: center; margin-top: 1rem;">Don't have an account? <a href="{{ url_for('main.register') }}">Register here</a></p>
        </form>
    </div>
</div>
{% endblock %}
