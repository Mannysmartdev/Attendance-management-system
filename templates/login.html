{% extends "base.html" %}
{% block title %}AttendSys — Sign In{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="logo-area">
        <i class="bi bi-mortarboard-fill"></i>
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
    </div>

    <form method="POST" action="" autocomplete="off">
        <div style="margin-bottom: 1rem;">
            <label for="username">Username / Matric No</label>
            <input type="text" id="username" name="username" required placeholder="Enter your ID">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>

        <p style="text-align: center; margin-top: 1.25rem; font-size: .88rem; color: var(--text-secondary);">
            Don't have an account?
            <a href="{{ url_for('main.register') }}">Register here</a>
        </p>
    </form>
</div>
{% endblock %}
